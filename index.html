<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>360 Crime Scene Swab Tool</title>

  <!-- Pannellum -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css"/>
  <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

  <style>
    body { font-family: Georgia; text-align: center; }

    #panorama {
      width: calc(100vw - 320 px);
      height: calc(100vh - 220 px);
      
      aspect-ratio; 2/1;
      margin: auto;
    }

    .marker {
      width: 14px;
      height: 14px;
      background: rgb(199, 188, 188);
      border-radius: 50%;
      border: 2px solid white;
      opacity: 0.9;
    }

    .selected {
      background: blue !important;
    }
  </style>
</head>
<body>

<h3>Klik in de afbeelding op een locatie waar u een bemonstering zou nemen.</h3>

<div id="panorama"></div>

<br>
<p id="result"></p>

<script>
// For storing the data and user behaviour
let eventLog = []
let starttime = Date.now()

function logEvent(type, details = {}) {
  eventLog.push({
    type: type, 
    time: Date.now() - starttime,
    ...details
  });
}

// For overlapping swabbing detection
let too_close = false; 

function getDynamicThreshold() {
  const hfov = viewer.getHfov();
  const baseThreshold = 1.5;
  return baseThreshold * Math.sqrt(hfov / 100);
}

// General variables
let swabs = [];
let selectedIndex = null;
let testing_sample = null;
let swab_number = 1;

// INIT PANORAMA
const viewer = pannellum.viewer('panorama', {
  type: 'equirectangular',
  panorama: 'Bar_Scene.jpg',
  autoLoad: true,
});

viewer.on('load', function () {
  const panoContainer = document.getElementById('panorama');

  // Create a wrapper that sits on top of the viewer
  const customControls = document.createElement('div');
  customControls.style.position = 'absolute';
  customControls.style.top = '100px';
  customControls.style.left = '5px';
  customControls.style.display = 'flex';
  customControls.style.flexDirection = 'column';
  customControls.style.gap = '6px';
  customControls.style.zIndex = '1000';
  customControls.className = 'custom-controls';

  // --- Buttons ---
  const testBtn = document.createElement('button');
  testBtn.innerText = '🧪';
  testBtn.onclick = testSelected;

  const removeBtn = document.createElement('button');
  removeBtn.innerText = '🗑';
  removeBtn.onclick = RequestRemoveSwab;

  // Style
  [testBtn, removeBtn].forEach(btn => {
    btn.style.padding = '6px';
    btn.style.background = 'rgba(0,0,0,0.6)';
    btn.style.color = 'white';
    btn.style.border = '1px solid white';
    btn.style.cursor = 'pointer';
  });

  customControls.appendChild(testBtn);
  customControls.appendChild(removeBtn);
  
  panoContainer.style.position = 'relative';
  panoContainer.appendChild(customControls);
});

// CLICK → ADD SWAB
let startX = 0;
let startY = 0;
let isDragging = false;

const threshold = 5; // pixels (tweak if needed)

const panoEl = document.getElementById('panorama');

// MOUSEDOWN → record starting point
panoEl.addEventListener('mousedown', function(e) {
  startX = e.clientX;
  startY = e.clientY;
  isDragging = false;
});

// MOUSEMOVE → detect drag
panoEl.addEventListener('mousemove', function(e) {
  const dx = Math.abs(e.clientX - startX);
  const dy = Math.abs(e.clientY - startY);

  if (dx > threshold || dy > threshold) {
    isDragging = true;
  }
});

// MOUSEUP → decide click vs drag
panoEl.addEventListener('mouseup', function(e) {
  if (isDragging) return; // ignore drags

  //Ignore clicks on UI controls
  if (e.target.closest('.pnlm-controls') || e.target.closest(".custom-controls") || e.target.closest("#removeChoiceBox")) {return};

  const coords = viewer.mouseEventToCoords(e);

  const swab = {
    pitch: coords[0],
    yaw: coords[1],
    result: null,
    swabNum: swab_number,
  };

  // Preventing sampling too close so that selecting a previous swap becomes a challenge
  const swab_overlap_threshold = getDynamicThreshold();

  for (let i = 0; i < swabs.length; i++) {
    const dist = angularDistance(swab, swabs[i]);

    if (dist < swab_overlap_threshold) {
      too_close = true;
      selectSwab(swabs[i].hotspotID);
      return;
    }
  }

  function angularDistance(a, b) {
  const toRad = deg => deg * Math.PI / 180;

  const pitch1 = toRad(a.pitch);
  const yaw1 = toRad(a.yaw);
  const pitch2 = toRad(b.pitch);
  const yaw2 = toRad(b.yaw);

  const dYaw = yaw2 - yaw1;

  const angle = Math.acos(
    Math.sin(pitch1) * Math.sin(pitch2) +
    Math.cos(pitch1) * Math.cos(pitch2) * Math.cos(dYaw)
  );

  return angle * (180 / Math.PI); // back to degrees
}

  if (!too_close){
    swabs.push(swab);
    drawMarker(swabs.length - 1);
    swab_number = swab_number + 1
  }

  // Reset all markers
  document.querySelectorAll('.marker').forEach(m => {
    m.classList.remove('selected');
  });

  if (!testing_sample){
    document.getElementById("result").innerText = ""
  }

  //Resetting variables
  selectedIndex = null;
  too_close = false
});

// DRAW MARKER
function drawMarker(index, redrawing=false) {
  const swab = swabs[index];

  const hotspotID = "swab-" + index;
  swab.hotspotID = hotspotID;

  if (!redrawing){
    logEvent("add_swab", {
      id: swab.hotspotID,
      pitch: swab.pitch,
      yaw: swab.yaw
    });
  }

  viewer.addHotSpot({
    id: hotspotID,
    pitch: swab.pitch,
    yaw: swab.yaw,
    swabNum: swab_number,
    cssClass: 'marker',
    createTooltipFunc: function(hotSpotDiv) {
      hotSpotDiv.onclick = function(e) {
        e.stopPropagation(); // prevent adding a new swab underneath
        selectSwab(hotspotID);
      };
    }
  });
}


// SELECT SWAB
function selectSwab(hotspotID) {
  const id = hotspotID
  selectedIndex = swabs.findIndex(function (swab) {return swab.hotspotID == id});

  // Reset all markers
  document.querySelectorAll('.marker').forEach(m => {
    m.classList.remove('selected');
  });

  // Highlight selected
  document.querySelectorAll('.marker')[selectedIndex].classList.add('selected');

  // Show swab information
  swab = swabs[selectedIndex]
  if (swab.result){
    document.getElementById("result").innerText = "Swab " + swab.swabNum + " - " + swab.result
  } else {
    document.getElementById("result").innerText = "Swab " + swab.swabNum
  }

  // Reset the too close variable
  too_close = false
}

// REMOVE SWAB
function RequestRemoveSwab(){
  if (selectedIndex === null){
    alert("Selecteer eerst een bemonstering.");
    return;
  }

  const swab = swabs[selectedIndex];

  //Prevent the removal of a swab that is currently being tested
  if (swab.hotspotID === testing_sample) {
    alert("U kunt een sample die momenteel wordt geanalyseerd niet verwijderen.");
    return;
  }

  showRemovalOptions(swab);
}

function showRemovalOptions(swab) {
  // Prevent duplicates
  const existing = document.getElementById("removeModal");
  if (existing) existing.remove();

  // --- Overlay (dark background) ---
  const overlay = document.createElement("div");
  overlay.id = "removeModal";
  overlay.style.position = "fixed";
  overlay.style.top = "0";
  overlay.style.left = "0";
  overlay.style.width = "100vw";
  overlay.style.height = "100vh";
  overlay.style.background = "rgba(0,0,0,0.5)";
  overlay.style.display = "block";
  overlay.style.position = "absolute";
  overlay.style.zIndex = "3000";

  // --- Modal box ---
  const modal = document.createElement("div");
  modal.style.background = "white";
  modal.style.padding = "10px";
  modal.style.borderRadius = "10px";
  modal.style.textAlign = "center";
  modal.style.minWidth = "300px";
  modal.style.boxShadow = "0 4px 10px rgba(0,0,0,0.3)";
  modal.style.position = "absolute";
  modal.style.top = "20px";
  modal.style.left = "50%";
  modal.style.transform = "translateX(-50%)";

  const text = document.createElement("p");
  text.innerText = "Verwijdert u deze bemonstering omdat\nhet plaatsen ervan niet gewenst was?";

  // --- Buttons ---
  const btnMisplaced = document.createElement("button");
  btnMisplaced.innerText = "Ja";
  btnMisplaced.style.margin = "5px";
  btnMisplaced.onclick = function() {
    confirmRemoveSwab(swab, "misplaced");
  };

  const btnIrrelevant = document.createElement("button");
  btnIrrelevant.innerText = "Nee";
  btnIrrelevant.style.margin = "5px";
  btnIrrelevant.onclick = function() {
    confirmRemoveSwab(swab, "post_test");
  };

  // Optional cancel button
  const btnCancel = document.createElement("button");
  btnCancel.innerText = "Annuleren";
  btnCancel.style.margin = "5px";
  btnCancel.onclick = function() {
    overlay.remove();
  };

  modal.appendChild(text);
  modal.appendChild(btnMisplaced);
  modal.appendChild(btnCancel);
  modal.appendChild(btnIrrelevant);

  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  // Prevent clicks from reaching panorama
  overlay.addEventListener('mousedown', e => e.stopPropagation());
  overlay.addEventListener('mouseup', e => e.stopPropagation());
}


function confirmRemoveSwab(swab, reason) {
  // Remove from array, reset and redraw
  swabs.splice(selectedIndex, 1);
  selectedIndex = null;
  redrawAllMarkers();

  // Logging the activity
  logEvent("remove_swab", {
    id: swab.hotspotID,
    reason: reason,
    result: swab.result
  });

  // Remove UI
  const overlay = document.getElementById("removeModal");
  if (overlay) overlay.remove();
  document.getElementById("result").innerText = ""
}

//Redraw markers after deleting a swab
function redrawAllMarkers() {
  // Remove all existing markers
  document.querySelectorAll('.marker').forEach(m => m.remove());
  
  // Re-adding the markers
  swabs.forEach((swab, index) => {
    drawMarker(index, redrawing=true)
  })
}

// TEST SWAB
function testSelected() {
  if (selectedIndex === null) {
    alert("Selecteer eerst een bemonstering");
    return;
  }

  if (testing_sample) {
    alert("Er wordt momenteel al een sample geanalyseerd.");
    return;
  }

  const result = "onvoldoende DNA";

  swabs[selectedIndex].result = result;
  swab = swabs[selectedIndex]
  testing_sample = swab.hotspotID

  logEvent("test_swab", {
    id: swab.hotspotID,
    result: swab.result
  });

  let time = 7;
  let dots = 1;
  let dot = ".";
  document.getElementById("result").innerText = "Swab " + swab.swabNum + " wordt geanalyseerd"

  let CountDown = setInterval(function () {
    document.getElementById("result").innerText = "Swab " + swab.swabNum + " wordt geanalyseerd" + dot.repeat(dots);
    time--;
    dots++;

    if (time < 0) {
      clearInterval(CountDown)
      document.getElementById("result").innerText =
      "Resultaat: Swab " + swab.swabNum + " bevat " + result;
      testing_sample = null;
    }
  }, 1000)
}

function Showresults() {
  for (let i = 0; i < swabs.length; i++) {
    console.log(swabs[i])
  }

  for (let i = 0; i < eventLog.length; i++) {
    console.log(eventLog[i])
  }
}

function sendDataToQualtrics() {
  if (window.parent && window.parent.Qualtrics) {

    // Final swabs (for heatmap)
    window.parent.Qualtrics.SurveyEngine.setEmbeddedData(
      "finalSwabs",
      JSON.stringify(swabs)
    );

    // Event log (for process analysis)
    window.parent.Qualtrics.SurveyEngine.setEmbeddedData(
      "eventLog",
      JSON.stringify(eventLog)
    );
  }
}

// Listen for request from Qualtrics
window.addEventListener("message", function(event) {
  if (event.data === "requestData") {

    const payload = {
      eventLog: eventLog,
      finalSwabs: swabs
    };

    // Send data back to Qualtrics
    window.parent.postMessage(payload, "*");
  }
});
</script>

</body>
</html>
